server.port=8080

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/eticaret}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Minimum 32+ chars for HS256 key
app.jwt.secret=MyVerySecretJwtKeyForHomeworkProject123456
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# springdoc
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.example.auth

# Iyzico sandbox
iyzico.api-key=${IYZICO_API_KEY:}
iyzico.secret-key=${IYZICO_SECRET_KEY:}
iyzico.base-url=${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
iyzico.callback-url=${IYZICO_CALLBACK_URL:http://localhost:8080/api/payments/iyzico/callback}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# Ollama (shopping assistant)
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:qwen2.5:7b}
